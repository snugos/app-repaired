<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnugOS</title>
    <link rel="apple-touch-icon" sizes="57x57" href="apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/lib/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Controls Bar - Always visible at top -->
    <div id="globalControlsBar" class="fixed top-0 left-0 right-0 h-12 bg-zinc-900 border-b border-zinc-700 flex items-center px-4 gap-4 z-[9999]">
        <div class="flex items-center gap-2">
            <button id="playBtnGlobal" title="Play/Pause (Spacebar)" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-1 px-3 rounded text-sm transition-colors">Play</button>
            <button id="stopBtnGlobal" title="Stop All Audio" class="bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-1 px-3 rounded text-sm transition-colors">Stop</button>
            <button id="recordBtnGlobal" title="Record Arm/Disarm" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-1 px-3 rounded text-sm transition-colors">Rec</button>
        </div>
        
        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-400">BPM:</label>
            <input type="number" id="tempoGlobalInput" value="120" min="30" max="300" step="0.1" class="w-16 p-1 bg-zinc-800 border border-zinc-600 rounded text-white text-sm text-center">
        </div>
        
        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-400">MIDI:</label>
            <select id="midiInputSelectGlobal" class="bg-zinc-800 border border-zinc-600 rounded text-white text-sm px-2 py-1">
                <option value="">No MIDI</option>
            </select>
        </div>
        
        <div class="flex items-center gap-2">
            <label class="text-xs text-gray-400">Master:</label>
            <div id="masterMeterContainerGlobal" class="w-24 h-4 bg-zinc-800 rounded border border-zinc-600 overflow-hidden">
                <div id="masterMeterBarGlobal" class="h-full bg-blue-500 transition-all duration-50" style="width: 0%;"></div>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <span id="midiIndicatorGlobal" class="px-2 py-0.5 rounded text-xs bg-zinc-700 text-gray-400" title="MIDI Activity">MIDI</span>
            <span id="keyboardIndicatorGlobal" class="px-2 py-0.5 rounded text-xs bg-zinc-700 text-gray-400" title="Keyboard Activity">KBD</span>
        </div>
        
        <div class="flex-1"></div>
        
        <button id="playbackModeToggleBtnGlobal" title="Toggle Playback Mode" class="bg-sky-600 hover:bg-sky-700 text-white font-semibold py-1 px-3 rounded text-sm transition-colors">Mode: Sequencer</button>
    </div>

    <div id="desktop" class="pt-12">
        <!-- Desktop area for windows -->
    </div>

    <div id="taskbar">
        <button id="startButton">Start</button>
        <div id="taskbarButtons">
            <!-- Window buttons appear here -->
        </div>
        <div id="taskbarTempoDisplay" title="Current Tempo">120.0 BPM</div>
    </div>

    <div id="startMenu" class="hidden">
        <ul>
            <li id="tetris.html"><a href="https://snugos.github.io/app/tetris.html">Tetris</a></li>
            <li id="menuAddSynthTrack">Add Synth Track</li>
            <li id="menuAddSamplerTrack">Add Slicer Sampler Track</li>
            <li id="menuAddDrumSamplerTrack">Add Sampler (Pads)</li>
            <li id="menuAddInstrumentSamplerTrack">Add Instrument Sampler Track</li>
            <li><hr></li>
            <li id="menuOpenSoundBrowser">Sound Browser</li>
            <li><hr></li>
            <li id="menuOpenMixer">Mixer</li>
            <li id="menuOpenMasterEffects">Master Effects Rack</li>
            <li><hr></li>
            <li id="menuUndo" class="disabled" title="Undo">Undo</li>
            <li id="menuRedo" class="disabled" title="Redo">Redo</li>
            <li><hr></li>
            <li id="menuSaveProject">Save Project (.snug)</li>
            <li id="menuLoadProject">Load Project (.snug)</li>
            <li id="menuExportWav">Export to WAV</li>
            <li><hr></li>
            <li id="menuToggleFullScreen">Toggle Full Screen</li>
        </ul>
    </div>

    <input type="file" id="loadProjectInput" class="hidden" accept=".snug">
    <input type="file" id="customBgInput" class="hidden" accept="image/*">
    <input type="file" id="sampleFileInput" class="hidden" accept="audio/*">


    <div id="notification-area"></div>

    <div id="modalContainer"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

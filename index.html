<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnugOS</title>
    <link rel="apple-touch-icon" sizes="57x57" href="apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="ms-icon-144x144.png">
    <meta name="theme-color" content="#ffffff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/lib/Tone.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Windows 95 style buttons */
        .win95-btn {
            background: #c0c0c0;
            border: none;
            padding: 4px 12px;
            font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
            font-size: 12px;
            font-weight: normal;
            color: #000;
            cursor: pointer;
            box-shadow: 
                inset -1px -1px 0 #0a0a0a,
                inset 1px 1px 0 #ffffff,
                inset -2px -2px 0 #808080,
                inset 2px 2px 0 #dfdfdf;
        }
        .win95-btn:active {
            box-shadow: 
                inset 1px 1px 0 #0a0a0a,
                inset -1px -1px 0 #ffffff,
                inset 2px 2px 0 #808080,
                inset -2px -2px 0 #dfdfdf;
            padding: 5px 11px 3px 13px;
        }
        .win95-btn.playing {
            background: #90EE90; /* Light green */
        }
        .win95-btn.recording {
            background: #FF6B6B; /* Light red */
        }
        
        /* Windows 95 input fields */
        .win95-input {
            background: #ffffff;
            border: none;
            padding: 2px 4px;
            font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
            font-size: 12px;
            box-shadow: 
                inset 1px 1px 0 #0a0a0a,
                inset -1px -1px 0 #ffffff,
                inset 2px 2px 0 #808080,
                inset -2px -2px 0 #dfdfdf;
        }
        
        /* Windows 95 select/dropdown */
        .win95-select {
            background: #ffffff;
            border: none;
            padding: 2px 4px;
            font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
            font-size: 12px;
            box-shadow: 
                inset 1px 1px 0 #0a0a0a,
                inset -1px -1px 0 #ffffff,
                inset 2px 2px 0 #808080,
                inset -2px -2px 0 #dfdfdf;
        }
    </style>
</head>
<body>
    <!-- Global Controls Bar - Always visible at top - Windows 95 Style -->
    <div id="globalControlsBar" class="fixed top-0 left-0 right-0 h-10 bg-[#c0c0c0] border-b-2 border-[#808080] flex items-center px-2 gap-2 z-[9999]">
        <div class="flex items-center gap-1">
            <!-- Play Button -->
            <button id="playBtnGlobal" title="Play/Pause (Spacebar)" class="win95-btn">
                ▶ Play
            </button>
            
            <!-- Stop Button -->
            <button id="stopBtnGlobal" title="Stop All Audio" class="win95-btn">
                ■ Stop
            </button>
            
            <!-- Record Button -->
            <button id="recordBtnGlobal" title="Record Arm/Disarm" class="win95-btn">
                ● Rec
            </button>
        </div>
        
        <div class="h-5 w-0.5 bg-[#808080] mx-1"></div>
        
        <div class="flex items-center gap-1">
            <label class="text-xs font-bold text-black">BPM:</label>
            <input type="number" id="tempoGlobalInput" value="120" min="30" max="300" step="0.1" class="win95-input w-14 text-center">
        </div>
        
        <div class="flex items-center gap-1">
            <label class="text-xs font-bold text-black">MIDI:</label>
            <select id="midiInputSelectGlobal" class="win95-select">
                <option value="">None</option>
            </select>
        </div>
        
        <div class="flex items-center gap-1">
            <label class="text-xs font-bold text-black">Master:</label>
            <div id="masterMeterContainerGlobal" class="w-20 h-4 bg-white" style="box-shadow: inset 1px 1px 0 #0a0a0a, inset -1px -1px 0 #ffffff, inset 2px 2px 0 #808080, inset -2px -2px 0 #dfdfdf;">
                <div id="masterMeterBarGlobal" class="h-full bg-green-500" style="width: 0%;"></div>
            </div>
        </div>
        
        <div class="flex items-center gap-1">
            <span id="midiIndicatorGlobal" class="px-1 text-xs bg-[#c0c0c0] text-black" style="box-shadow: inset -1px -1px 0 #0a0a0a, inset 1px 1px 0 #ffffff, inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf;" title="MIDI Activity">MIDI</span>
            <span id="keyboardIndicatorGlobal" class="px-1 text-xs bg-[#c0c0c0] text-black" style="box-shadow: inset -1px -1px 0 #0a0a0a, inset 1px 1px 0 #ffffff, inset -2px -2px 0 #808080, inset 2px 2px 0 #dfdfdf;" title="Keyboard Activity">KBD</span>
        </div>
        
        <div class="flex-1"></div>
        
        <button id="playbackModeToggleBtnGlobal" title="Toggle Playback Mode" class="win95-btn">Mode: Sequencer</button>
    </div>

    <div id="desktop" class="pt-14">
        <!-- Desktop area for windows -->
    </div>

    <div id="taskbar">
        <button id="startButton">Start</button>
        <div id="taskbarButtons">
            <!-- Window buttons appear here -->
        </div>
        <div id="taskbarTempoDisplay" title="Current Tempo">120.0 BPM</div>
    </div>

    <div id="startMenu" class="hidden">
        <ul>
            <li id="tetris.html"><a href="https://snugos.github.io/app/tetris.html">Tetris</a></li>
            <li id="menuAddSynthTrack">Add Synth Track</li>
            <li id="menuAddSamplerTrack">Add Slicer Sampler Track</li>
            <li id="menuAddDrumSamplerTrack">Add Sampler (Pads)</li>
            <li id="menuAddInstrumentSamplerTrack">Add Instrument Sampler Track</li>
            <li><hr></li>
            <li id="menuOpenSoundBrowser">Sound Browser</li>
            <li><hr></li>
            <li id="menuOpenMixer">Mixer</li>
            <li id="menuOpenMasterEffects">Master Effects Rack</li>
            <li><hr></li>
            <li id="menuUndo" class="disabled" title="Undo">Undo</li>
            <li id="menuRedo" class="disabled" title="Redo">Redo</li>
            <li><hr></li>
            <li id="menuSaveProject">Save Project (.snug)</li>
            <li id="menuLoadProject">Load Project (.snug)</li>
            <li id="menuExportWav">Export to WAV</li>
            <li><hr></li>
            <li id="menuToggleFullScreen">Toggle Full Screen</li>
        </ul>
    </div>

    <input type="file" id="loadProjectInput" class="hidden" accept=".snug">
    <input type="file" id="customBgInput" class="hidden" accept="image/*">
    <input type="file" id="sampleFileInput" class="hidden" accept="audio/*">


    <div id="notification-area"></div>

    <div id="modalContainer"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
